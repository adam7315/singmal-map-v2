<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>新馬5日行程地圖（環球影城＋夜間動物園版）｜台灣整合防災工程顧問</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  html,body{margin:0;padding:0;height:100%;font-family:"Microsoft JhengHei","微軟正黑體",system-ui,sans-serif}
  #map{position:absolute;top:0;bottom:0;left:0;right:0}
  .hdr{position:absolute;z-index:1000;top:10px;left:50px;background:rgba(255,255,255,.95);
       padding:8px 14px;border-radius:6px;box-shadow:0 1px 6px rgba(0,0,0,.3);font-size:15px;font-weight:700}
  .legend{background:rgba(255,255,255,.96);padding:10px 12px;border-radius:6px;
          box-shadow:0 1px 6px rgba(0,0,0,.3);font-size:13px;line-height:1.6;
          max-height:82vh;overflow-y:auto;max-width:305px}
  .legend .key{font-size:12px;color:#333;margin:2px 0 6px;padding-bottom:6px;border-bottom:1px solid #ddd}
  .legend .key b{margin-right:2px}
  .legend .dh{font-weight:700;margin:9px 0 4px}
  .legend .dh i{display:inline-block;width:13px;height:13px;border-radius:50%;margin-right:6px;vertical-align:-1px}
  .legend .st{font-size:12px;line-height:1.45;padding-left:2px;color:#222;display:flex;align-items:flex-start}
  .legend .st .sh{flex:0 0 16px;width:16px;height:16px;margin-right:5px;color:#fff;font-size:10px;
                   text-align:center;line-height:16px;font-weight:700}
  .legend .st .nm{flex:1}
  .legend .st .tm{color:#c0392b;font-weight:700;white-space:nowrap;margin-left:4px}
  .legend .meal{font-size:12px;color:#888;padding-left:23px;margin:1px 0;font-style:italic}
  .legend .mv{font-size:11px;color:#777;padding-left:23px;margin:1px 0}
  .sh-circle{border-radius:50%}
  .sh-diamond{border-radius:2px;transform:rotate(45deg)}
  .sh-diamond span{display:inline-block;transform:rotate(-45deg)}
  .sh-gate{border-radius:50%;border:2px dashed #fff !important}
  .mk{background:transparent;border:none}
  .mk .box{width:26px;height:26px;color:#fff;font-weight:700;font-size:12px;
           display:flex;align-items:center;justify-content:center;border:2px solid #fff;
           box-shadow:0 1px 4px rgba(0,0,0,.5)}
  .mk .box span{display:inline-block}
  .leaflet-popup-content{font-size:14px;line-height:1.6;margin:10px 12px}
  .leaflet-popup-content b{font-size:15px}
  .leaflet-popup-content .d{color:#666;font-size:12px}
  @media(max-width:600px){.hdr{font-size:12px;left:50px;right:10px}.legend{font-size:12px;max-width:230px}}
</style>
</head>
<body>
<div class="hdr">新馬5日　麻六甲＋夜間動物園＋環球影城版（餐食只留時段）</div>
<div id="map"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// [名稱, lat, lng, 時間, 移動說明, type, 餐註]
// type: sight=景點(圓) hotel=住宿(菱) gate=關卡(虛線圓) meal=用餐(不上圖,只留時段)
const DAYS = [
 { name:"第1天 桃園→吉隆坡→Outlet→雲頂", color:"#e6194b", pts:[
   ["吉隆坡國際機場 KLIA T1",2.75427,101.70466,"11:45抵達／出關","機上早餐","sight",""],
   ["午餐（時段，餐廳由旅行社安排）",0,0,"13:15-14:15","","meal","不指定地點"],
   ["雲頂 Premium Outlets（Awana）",3.4033765,101.7831159,"15:45-18:20","車程約90分","sight",""],
   ["雲頂 SkyAvenue／飯店",3.4239007,101.7938018,"18:45入住","纜車約15分","hotel",""],
   ["晚餐（時段，飯店自助）",0,0,"19:15-20:45","","meal","飯店內"],
 ]},
 { name:"第2天 雲頂→清水岩廟→吉隆坡市區", color:"#f58231", pts:[
   ["雲頂 SkyAvenue／飯店（起點）",3.4239007,101.7938018,"早餐07:00-08:00→08:30出發","—","hotel",""],
   ["清水岩廟 Chin Swee Caves Temple",3.4125879,101.7881491,"09:00-09:40","下山車程約20分","sight",""],
   ["雙峰塔 KLCC",3.1574693,101.7115639,"11:00-12:00","車程約60分","sight",""],
   ["午餐（時段，餐廳由旅行社安排）",0,0,"12:00-13:00","","meal","不指定地點"],
   ["茨廠街 Petaling Street",3.1425319,101.6982998,"13:30起｜步行圈","車程約15分","sight",""],
   ["鬼仔巷 Kwai Chai Hong",3.1414715,101.6976131,"步行","步行3分","sight",""],
   ["REX KL 復古迷宮書店",3.1449093,101.6984824,"步行","步行5分","sight",""],
   ["默迪卡118 Merdeka 118",3.1418445,101.7006433,"步行","步行8分","sight",""],
   ["獨立廣場 Dataran Merdeka",3.1490605,101.6936592,"步行","步行10分","sight",""],
   ["生命之河 River of Life",3.1471198,101.6952148,"步行","步行5分","sight",""],
   ["亞羅街夜市（晚餐在此）",3.146121,101.7092762,"18:15-20:15","車程約10分","sight","夜市小吃"],
   ["金普頓 Kimpton Naluria TRX",3.1424073,101.7168132,"住宿","車程約10分","hotel",""],
 ]},
 { name:"第3天 吉隆坡→布城→大紅花（渡假村日）", color:"#3cb44b", pts:[
   ["金普頓 TRX（起點）",3.1424073,101.7168132,"早餐07:00-08:00→09:00出發","—","hotel",""],
   ["布城 粉紅清真寺＋布城遊湖",2.9360702,101.689213,"09:45-12:15","車程約40分","sight",""],
   ["午餐（時段，餐廳由旅行社安排）",0,0,"12:15-13:15","","meal","不指定地點"],
   ["大紅花 Lexis Hibiscus Port Dickson",2.4184919,101.8738791,"15:00入住｜午後泳池海灘","車程約110分","hotel",""],
   ["晚餐（時段，渡假村）",0,0,"18:00-19:30","","meal","渡假村內"],
 ]},
 { name:"第4天 大紅花→麻六甲→夜間動物園→新加坡", color:"#911eb4", pts:[
   ["大紅花（起點）",2.4184919,101.8738791,"早餐07:00-08:00→08:00退房","—","hotel",""],
   ["麻六甲古城（荷蘭紅屋、雞場街）",2.1940808,102.2491414,"09:30-11:30｜基督堂、聖保羅教堂、雞場街","車程約90分","sight",""],
   ["午餐（時段，麻六甲）",0,0,"11:30-12:30","","meal","不指定地點"],
   ["馬新關卡 Tuas（下車通關查驗）",1.4712343,103.6083531,"15:00-16:30｜非景點，馬出境＋星入境","車程約150分","gate",""],
   ["夜間動物園 Night Safari",1.4021872,103.7880606,"19:15-21:00｜18:30到萬禮，晚餐自理+等候入園","通關後車程約60分","sight","晚餐自理"],
   ["新加坡飯店（市區）",1.2905,103.8570,"21:45入住","車程約40分","hotel",""],
 ]},
 { name:"第5天 環球影城→桃園（15:45班機）", color:"#0082c8", pts:[
   ["新加坡飯店（起點）",1.2905,103.8570,"早餐07:30-08:30→退房出發","—","hotel",""],
   ["環球影城 USS（聖淘沙）",1.2540421,103.8238084,"10:00-12:30｜約2.5小時","車程約40分","sight",""],
   ["樟宜機場｜15:45起飛",1.3644202,103.9915308,"13:30抵達→報到｜時間偏緊","車程約60分","hotel",""],
 ]},
];

const map = L.map('map');
const gRoad = L.tileLayer('https://{s}.google.com/vt/lyrs=m&hl=zh-TW&x={x}&y={y}&z={z}',
  {maxZoom:20, subdomains:['mt0','mt1','mt2','mt3'], attribution:'&copy; Google'}).addTo(map);
const gSat = L.tileLayer('https://{s}.google.com/vt/lyrs=y&hl=zh-TW&x={x}&y={y}&z={z}',
  {maxZoom:20, subdomains:['mt0','mt1','mt2','mt3'], attribution:'&copy; Google'});

const shapeClass = {sight:'sh-circle', hotel:'sh-diamond', gate:'sh-gate'};
const overlays = {};
const all = [];

DAYS.forEach(day=>{
  const g = L.layerGroup();
  const line = [];
  let n = 0;
  day.pts.forEach(p=>{
    const [nm,lat,lng,time,move,type] = p;
    if(type==='meal') return;
    n++;
    line.push([lat,lng]); all.push([lat,lng]);
    const sc = shapeClass[type];
    const inner = (type==='hotel') ? `<span>${n}</span>` : n;
    L.marker([lat,lng],{icon:L.divIcon({className:'mk',
      html:`<div class="box ${sc}" style="background:${day.color}">${inner}</div>`,
      iconSize:[26,26], iconAnchor:[13,13], popupAnchor:[0,-14]})})
     .bindPopup(`<b>${day.name.split(' ')[0]}-${n}　${nm}</b><br>
                 <span class="d">🕒 ${time}</span><br>
                 ${move&&move!=='—'?`<span class="d">🚌 ${move}</span><br>`:''}
                 <span class="d">${lat.toFixed(5)}, ${lng.toFixed(5)}</span><br>
                 <a href="https://www.google.com/maps?q=${lat},${lng}" target="_blank">Google Maps 開啟</a>`)
     .bindTooltip(`${n}. ${nm}`,{direction:'right',offset:[14,0]})
     .addTo(g);
  });
  L.polyline(line,{color:day.color,weight:3,opacity:.7,dashArray:'6,6'}).addTo(g);
  g.addTo(map);
  overlays[`<span style="color:${day.color};font-weight:700">■</span> ${day.name}`] = g;
});

map.fitBounds(all,{padding:[40,40]});
L.control.layers({"Google 地圖":gRoad,"Google 衛星":gSat}, overlays,
  {collapsed:false, position:'topright'}).addTo(map);

const lg = L.control({position:'bottomleft'});
lg.onAdd = function(){
  const d = L.DomUtil.create('div','legend');
  L.DomEvent.disableScrollPropagation(d);
  L.DomEvent.disableClickPropagation(d);
  let h = '<b>行程時刻表</b>';
  h += '<div class="key"><b style="color:#555">●</b>景點　'+
       '<b style="color:#555">◆</b>住宿／機場　'+
       '<b style="color:#555">◌</b>關卡　'+
       '<span style="color:#888;font-style:italic">🍴用餐時段</span></div>';
  DAYS.forEach(day=>{
    h += `<div class="dh"><i style="background:${day.color}"></i>${day.name}</div>`;
    let n=0;
    day.pts.forEach(p=>{
      const [nm,lat,lng,time,move,type,note] = p;
      if(type==='meal'){
        h += `<div class="meal">🍴 ${nm.replace(/（.*?）/,'')} ${time}${note?'（'+note+'）':''}</div>`;
        return;
      }
      if(move && move!=='—') h += `<div class="mv">🚌 ${move}</div>`;
      n++;
      const sc = shapeClass[type];
      const inner = (type==='hotel') ? `<span>${n}</span>` : n;
      h += `<div class="st"><span class="sh ${sc}" style="background:${day.color}">${inner}</span>`+
           `<span class="nm">${nm}</span><span class="tm">${time.split('｜')[0]}</span></div>`;
    });
  });
  h += '<div style="color:#666;font-size:11px;margin-top:8px">'+
       '餐食只留時段、地點由旅行社安排；點地圖圖示看詳情</div>';
  d.innerHTML = h;
  return d;
};
lg.addTo(map);
</script>
</body>
</html>
